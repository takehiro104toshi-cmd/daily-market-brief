name: Daily Market Brief

# 毎朝7:00(JST) = 前日22:00(UTC)にレポート生成スクリプトを実行し、
# 生成されたMarkdown/HTMLレポートをコミットし、latest_market_brief.html を
# GitHub Pagesへ公開する（スマホからURLで閲覧できるようにするため）。
# メール・LINE通知は、対応するSecretsが設定されている場合のみ自動的に有効になる
# （未設定の場合は何もせずスキップする。詳細はREADME.mdを参照）。
# 手動実行(workflow_dispatch)にも対応。
# 使わない場合はこのファイルを削除するか、on: の内容を空にしてください。
#
# GitHub Pagesを使うには、リポジトリの Settings > Pages > Build and deployment >
# Source を「GitHub Actions」に設定してください（一度だけの手動設定が必要です）。
# 詳細は README.md の「GitHub Pagesで見る」を参照してください。

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

# 同時に複数のPagesデプロイが走らないようにする（GitHub推奨設定）。
# cancel-in-progress: true にすることで、新しい実行が始まったときに
# 前回のデプロイが deployment_queued のまま滞留して後続をブロックするのを防ぐ。
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate market brief
        env:
          # メール通知（Settings > Secrets and variables > Actions で設定。未設定ならスキップ）
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          # LINE通知（LINE Messaging APIのプッシュメッセージ。未設定ならスキップ）
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
          # 任意: Claude APIによるAI分析の文章磨き上げ（未設定ならルールベースのみで動作）
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 任意: EDINET APIキー（未設定でも動作するが、取得できる場合がある）
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          # GitHub Pagesの公開URL（通知本文に含める）。owner/repo から自動算出されるため通常は設定不要。
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.md output/*.html
          git diff --cached --quiet || git commit -m "Add daily market brief"
          git push

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p pages-site
          cp output/latest_market_brief.html pages-site/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - name: Write job summary
        if: always()
        run: |
          {
            echo "### Daily Market Brief 実行結果"
            echo ""
            if [ -f output/latest_market_brief.md ]; then
              echo "- ✅ latest_market_brief.md 生成"
            else
              echo "- ❌ latest_market_brief.md が見つかりません"
            fi
            if [ -f output/latest_market_brief.html ]; then
              echo "- ✅ latest_market_brief.html 生成"
            else
              echo "- ❌ latest_market_brief.html が見つかりません"
            fi
            if [ -f output/mobile_market_brief.md ]; then
              echo "- ✅ mobile_market_brief.md 生成"
            else
              echo "- ❌ mobile_market_brief.md が見つかりません"
            fi
            echo ""
            echo "詳細な取得失敗（WARNING）は上のログを確認してください。"
            echo "個別の情報源の取得失敗はレポート内で「取得不可」と表示され、"
            echo "処理全体は失敗しない設計です。"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-pages:
    needs: generate-report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # deployment_queued のまま止まって見える現象に対応するため、
          # デプロイ完了待ちのポーリング設定を緩める（ミリ秒単位）。
          timeout: 1200000
          error_count: 10
          reporting_interval: 10000
