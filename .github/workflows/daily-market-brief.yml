name: Daily Market Brief

# 毎朝7:00(JST) = 前日22:00(UTC)にレポート生成スクリプトを実行し、
# 生成されたMarkdown/HTMLレポートをコミットし、latest_market_brief.html を
# GitHub Pagesへ公開する（スマホからURLで閲覧できるようにするため）。
# 手動実行(workflow_dispatch)にも対応。
# 使わない場合はこのファイルを削除するか、on: の内容を空にしてください。
#
# GitHub Pagesを使うには、リポジトリの Settings > Pages > Build and deployment >
# Source を「GitHub Actions」に設定してください（一度だけの手動設定が必要です）。
# 詳細は README.md の「GitHub Pagesで見る」を参照してください。

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

# 同時に複数のPagesデプロイが走らないようにする（GitHub推奨設定）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate market brief
        run: python main.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.md output/*.html
          git diff --cached --quiet || git commit -m "Add daily market brief"
          git push

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p pages-site
          cp output/latest_market_brief.html pages-site/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  deploy-pages:
    needs: generate-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
