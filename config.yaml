# 情報源別の信頼度スコア（0.0〜1.0）。同じ内容のニュースが複数の情報源から
# 配信された場合、重複除去（dedupe_headlines）で信頼度の高い方を残すために使う。
# 未掲載の情報源は既定値（0.5）が使われる。
source_reliability:
  "Yahoo!ニュース 経済": 0.6
  "ロイター(Yahoo!ニュース経由)": 0.75
  "NHKニュース 経済": 0.85
  "Yahoo!ニュース トピックス": 0.5
  "NHKニュース 総合": 0.85

