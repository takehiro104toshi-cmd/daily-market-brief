# 継続性の高い（構造的・政策的な背景を持ち、単発の材料出尽くしで終わりにくい）テーマ。
# strategist_engine.py の「継続性」「今後数週間重要か」の評価軸で、
# 単発ニュースより高いスコアを与えるために使う。
durable_themes:
  - "半導体"
  - "生成AI"
  - "AI"
  - "防衛"
  - "データセンター"
  - "資源"
  - "電力"

# ニュースを個別業種・関連銘柄へ変換するための「因果チェーン」ルール。
# 「羅針盤」レポート等から学習した、ストラテジストの一般的な思考プロセス
# （例: 原油安→航空/運輸のコスト低下→関連銘柄への追い風）を
# 汎用的なルールとして一般化したものであり、特定資料の文章の引用ではない。
# trigger_keywords: ニュース見出しに含まれるとルール発動
# beneficiary_sectors / negative_sectors: sectors: のキー名を指定
#   （related_tickers はsectors設定から解決する）
# durable: True の場合、継続性・今後数週間重要か の評価が上がる
causal_rules:
  - trigger_keywords: ["原油高", "原油上昇", "原油急騰", "WTI高"]
    theme: "資源価格"
    beneficiary_sectors: ["資源・エネルギー"]
    negative_sectors: ["自動車", "情報通信・生成AI"]
    durable: false
    note: "原油価格の上昇は資源関連には追い風、輸送・製造コストの増加を通じて他業種には逆風となりやすい"
  - trigger_keywords: ["原油安", "原油下落", "原油急落", "WTI安"]
    theme: "資源価格"
    beneficiary_sectors: ["自動車"]
    negative_sectors: ["資源・エネルギー"]
    durable: false
    note: "原油価格の下落は燃料・輸送コストの低下を通じて運輸・製造関連には追い風となりやすい"
  - trigger_keywords: ["半導体投資拡大", "AI投資拡大", "設備投資拡大", "データセンター投資"]
    theme: "AI・半導体設備投資"
    beneficiary_sectors: ["半導体・電子部品", "電機・電線・素材", "電力・インフラ"]
    negative_sectors: []
    durable: true
    note: "AI関連の設備投資拡大は、装置・部材・電力インフラなど周辺サプライチェーンへ波及しやすい"
  - trigger_keywords: ["メモリ価格高騰", "メモリ不足", "部材不足", "発売延期"]
    theme: "AI投資拡大の負の側面"
    beneficiary_sectors: []
    negative_sectors: ["情報通信・生成AI"]
    durable: false
    note: "部材価格の高騰や供給制約は、最終製品を手掛ける川下メーカーには一時的な逆風となる可能性がある"
  - trigger_keywords: ["防衛費", "防衛予算", "防衛装備", "防衛費増額"]
    theme: "防衛"
    beneficiary_sectors: ["重工業・防衛"]
    negative_sectors: []
    durable: true
    note: "防衛予算の拡大方針は、防衛関連の受注環境改善につながりやすい"
  - trigger_keywords: ["利上げ", "タカ派", "追加利上げ観測", "金融引き締め"]
    theme: "金融政策"
    beneficiary_sectors: ["金融"]
    negative_sectors: ["情報通信・生成AI"]
    durable: false
    note: "金利上昇は金融機関の利ざや改善に追い風となる一方、グロース株には割引率上昇を通じた逆風となりやすい"
  - trigger_keywords: ["利下げ", "ハト派", "金融緩和", "緩和的"]
    theme: "金融政策"
    beneficiary_sectors: ["情報通信・生成AI"]
    negative_sectors: ["金融"]
    durable: false
    note: "金利低下はグロース株のバリュエーションには追い風となる一方、金融機関の利ざやには逆風となりやすい"
  - trigger_keywords: ["円安"]
    theme: "為替"
    beneficiary_sectors: ["自動車", "重工業・防衛"]
    negative_sectors: []
    durable: false
    note: "円安方向への動きは輸出関連の採算改善期待につながりやすい"
  - trigger_keywords: ["円高"]
    theme: "為替"
    beneficiary_sectors: []
    negative_sectors: ["自動車", "重工業・防衛"]
    durable: false
    note: "円高方向への動きは輸出関連の採算悪化懸念につながりやすい"

# 「今日見るべき指標」セクション向けの節目ライン設定。
# name は indices/forex/rates/commodities の name と一致させる。
# lines: 節目として表示する値（現在値に最も近いラインを自動選択）
# above_note / below_note: 現在値がラインを上回っている/下回っている場合の一言
key_levels:
  - name: "米ドル/円"
    lines: [150, 155, 160]
    above_note: "円安が進行しやすく、輸出関連株には追い風、輸入コストには逆風となりやすい水準です。"
    below_note: "円高方向への転換が意識されやすく、輸出関連株には逆風となりやすい水準です。"
  - name: "VIX指数（恐怖指数）"
    lines: [20, 25, 30]
    above_note: "市場のリスク回避姿勢が強まりやすい水準です。"
    below_note: "落ち着いた相場地合いが意識されやすい水準です。"
  - name: "米10年国債利回り"
    lines: [4.0, 4.5, 5.0]
    above_note: "金利上昇が株式のバリュエーションの重荷として意識されやすい水準です。"
    below_note: "金利低下が株式には追い風として意識されやすい水準です。"
  - name: "WTI原油先物"
    lines: [70, 80, 90]
    above_note: "インフレ再燃への警戒が意識されやすい水準です。"
    below_note: "資源関連株には逆風、消費関連株には追い風が意識されやすい水準です。"
  - name: "金先物（ゴールド）"
    lines: [2200, 2400, 2600]
    above_note: "安全資産への資金シフトが意識されやすい水準です。"
    below_note: "リスク選好局面への回帰が意識されやすい水準です。"

# マクロイベントカレンダー（FOMC・日銀会合など、公開されているスケジュールを手動で管理）。
# 信頼できる公開のカレンダーAPI/RSSが確認できていないため、スクレイピングはせず
# ユーザーが把握している公開情報を手動で登録する運用としている。
# 「今日のイベント」セクションの今日／今週／今月の分類に利用される。
# label の書き方の例（v4）: 日銀金融政策決定会合・FOMC・米CPI（消費者物価指数）・
# 米PPI（生産者物価指数）・米雇用統計・SQ（特別清算指数算出日）・IPO・決算発表 等。
# 例:
# macro_events:
#   - { date: "2026-07-30", label: "FOMC（米連邦公開市場委員会）政策金利発表" }
#   - { date: "2026-07-31", label: "日銀金融政策決定会合" }
#   - { date: "2026-08-01", label: "米雇用統計発表" }
#   - { date: "2026-08-08", label: "米CPI（消費者物価指数）発表" }
#   - { date: "2026-08-09", label: "米PPI（生産者物価指数）発表" }
#   - { date: "2026-08-14", label: "SQ（特別清算指数算出日）" }
macro_events: []

output:
  dir: "output"
  timezone: "Asia/Tokyo"
  headlines_per_source: 8
  # GitHub Pagesの公開URL（通知本文に載せる）。
  # 空欄の場合、GitHub Actions実行時は環境変数 GITHUB_REPOSITORY から自動的に
  # "https://<owner>.github.io/<repo>/" を組み立てる。ローカル実行時などで
  # 明示したい場合はここに記載するか、環境変数 PAGES_URL を設定する。
  pages_url: ""
  # HTMLレポート上部の「最新情報に更新」ボタンから飛ぶ、GitHub Actions
  # workflowページのURL。空欄の場合、GitHub Actions実行時は環境変数
  # GITHUB_REPOSITORY から自動的に
  # "https://github.com/<owner>/<repo>/actions/workflows/daily-market-brief.yml"
  # を組み立てる。ローカル実行時などで明示したい場合はここに記載するか、
  # 環境変数 ACTIONS_URL を設定する。いずれも未設定の場合はボタン自体を表示しない。
  actions_url: ""

# 通知機能のON/OFF切り替え。
# enabled: false にすると、対応する環境変数が設定されていても通知を送らない。
# メール・LINEとも、環境変数が未設定の場合は自動的にスキップされ、
# レポート生成自体が失敗することはない。
notifications:
  email:
    enabled: true
  line:
    enabled: true
