# マクロイベントカレンダー（FOMC・日銀会合など、公開されているスケジュールを手動で管理）。
# 信頼できる公開のカレンダーAPI/RSSが確認できていないため、スクレイピングはせず
# ユーザーが把握している公開情報を手動で登録する運用としている。
# 「今日のイベント」セクションの今日／今週／今月の分類に利用される。
# label の書き方の例（v4）: 日銀金融政策決定会合・FOMC・米CPI（消費者物価指数）・
# 米PPI（生産者物価指数）・米雇用統計・SQ（特別清算指数算出日）・IPO・決算発表 等。
# 例:
# macro_events:
#   - { date: "2026-07-30", label: "FOMC（米連邦公開市場委員会）政策金利発表" }
#   - { date: "2026-07-31", label: "日銀金融政策決定会合" }
#   - { date: "2026-08-01", label: "米雇用統計発表" }
#   - { date: "2026-08-08", label: "米CPI（消費者物価指数）発表" }
#   - { date: "2026-08-09", label: "米PPI（生産者物価指数）発表" }
#   - { date: "2026-08-14", label: "SQ（特別清算指数算出日）" }
# v2.7: 任意で time（日本時間 "HH:MM"）を追加すると、「今週の重要イベント・
# 経済指標」（Weekly Event Impact Calendar）で「あと◯日 ◯時間」まで表示される。
# 例: - { date: "2026-08-08", label: "米CPI（消費者物価指数）発表", time: "21:30" }
macro_events: []

output:
  dir: "output"
  timezone: "Asia/Tokyo"
  headlines_per_source: 8
  # GitHub Pagesの公開URL（通知本文に載せる）。
  # 空欄の場合、GitHub Actions実行時は環境変数 GITHUB_REPOSITORY から自動的に
  # "https://<owner>.github.io/<repo>/" を組み立てる。ローカル実行時などで
  # 明示したい場合はここに記載するか、環境変数 PAGES_URL を設定する。
  pages_url: ""
  # HTMLレポート上部の「最新情報に更新」ボタンから飛ぶ、GitHub Actions
  # workflowページのURL。空欄の場合、GitHub Actions実行時は環境変数
  # GITHUB_REPOSITORY から自動的に
  # "https://github.com/<owner>/<repo>/actions/workflows/daily-market-brief.yml"
  # を組み立てる。ローカル実行時などで明示したい場合はここに記載するか、
  # 環境変数 ACTIONS_URL を設定する。いずれも未設定の場合はボタン自体を表示しない。
  actions_url: ""

# 通知機能のON/OFF切り替え。
# enabled: false にすると、対応する環境変数が設定されていても通知を送らない。
# メール・LINEとも、環境変数が未設定の場合は自動的にスキップされ、
# レポート生成自体が失敗することはない。
notifications:
  email:
    enabled: true
  line:
    enabled: true

# Rashinban Learning Source（v2.6）
# 岡三「羅針盤」を学習ソースとして読み込む設定。
# data/rashinban/ に .md / .txt を置くだけで、毎朝のGitHub Actions実行時に
# 自動で読み込まれ、分析フレーム（判断の型）として各分析へ補助的に反映される。
# ファイルが1つも無い場合は自動的にスキップされ、既存動作は一切変わらない。
# ※ 本文はレポートへ転載しない（ファイル名・日付・抽出フレーム数のみ表示）。
# ※ PDF/DOCXは対象外。md/txtへ変換して置く運用（詳細は data/rashinban/README.md）。
rashinban:
  dir: "data/rashinban"   # 羅針盤ファイルの置き場所
  # v2.7: 知識ベース化。最大100件を読み込み、重複統合＋重要度（複数号での
  # 繰り返し登場＋キーワード密度）順に重要な知識だけを抽出する。
  max_files: 100          # 新しい順に読み込む最大ファイル数

# ===== v2.8 Smart Intelligence Evolution =====

# 英語ニュース自動翻訳（④）。ANTHROPIC_API_KEY（Secrets）がある時のみ動作し、
# 英語見出しを日本語へ翻訳して「日本語 → 原文を見る」で表示する。
# キー未設定・失敗時は原文のまま（既存動作に影響なし）。
translation:
  enabled: true

# 経済カレンダー自動取得（⑤・安全スキャフォールド）。公開RSS/JSONのURLを
# 設定した場合のみ自動取得し、config.yamlのmacro_eventsとマージして
# 「今週の重要イベント」に反映する。未設定なら従来通りmacro_eventsのみ使用。
# 信頼できる無償ソースが確定するまでは空欄（自動取得なし）を推奨。
economic_calendar:
  url: ""

# Investment Journal（①）。毎日のAI判断を記録し、30/90/180日後に実際の
# 市場と自動で答え合わせする（GitHub Actionsが journal.json をコミットして永続化）。
investment_journal:
  dir: "data/investment_journal"

# Theme Confidence Learning（②）。毎日のテーマ予想を蓄積し勝率を学習して、
# Future IntelligenceのConfidenceを上下限つきで実績補正する。
theme_learning:
  dir: "data/theme_learning"
