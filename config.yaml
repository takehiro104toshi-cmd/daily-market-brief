  - { symbol: "^GSPC", name: "S&P500", stooq_symbol: "^spx" }
  - { symbol: "^IXIC", name: "ナスダック総合", stooq_symbol: "^ndq" }
  - { symbol: "^VIX", name: "VIX指数（恐怖指数）", stooq_symbol: "^vix" }

# 為替
forex:
  - { symbol: "JPY=X", name: "米ドル/円", stooq_symbol: "usdjpy" }
  - { symbol: "EURJPY=X", name: "ユーロ/円", stooq_symbol: "eurjpy" }
