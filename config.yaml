# EDINET書類一覧APIのエンドポイント上書き設定（省略時はsrc/collectors/edinet.pyの既定値を使用）。
# edinet:
#   documents_url: "https://disclosure.edinet-fsa.go.jp/api/v2/documents.json"

# FRED公開CSVエンドポイントの上書き設定（省略時はsrc/collectors/macro.pyの既定値を使用）。
# fred:
#   csv_url_template: "https://fred.stlouisfed.org/graph/fredgraph.csv?id={series_id}"
