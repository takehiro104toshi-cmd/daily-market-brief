# TDnet（適時開示情報閲覧サービス）※完全に公開されている一覧ページ
tdnet:
  list_url_template: "https://www.release.tdnet.co.jp/inbs/I_list_001_{date}.html"
  max_items: 20
  lookback_days: 3

# 注目テーマ抽出用キーワード（ニュース見出しに含まれるかで判定）
themes:
  - "半導体"
  - "生成AI"
  - "AI"
  - "円安"
  - "円高"
  - "インバウンド"
  - "防衛"
  - "資源"
  - "電力"
  - "EV"
  - "インフレ"
  - "利上げ"
  - "利下げ"
  - "電線"
  - "データセンター"
  - "商社"
  - "金融"
  - "化学"

# 注目業界の分類
# keywords: ニュース見出しの判定キーワード
# related_tickers: watchlistのティッカーのうち、この業種に関連する銘柄（注目銘柄セクションの中長期材料で参照）
sectors:
  # 半導体・電子部品: AI/データセンター向けGPU・HBM・製造装置・センサーなど、
  # AI設備投資の最も直接的な恩恵を受ける業種（大型〜中型株まで拡張、v1.8）。
  半導体・電子部品:
    keywords: ["半導体", "電子部品", "東京エレクトロン", "半導体製造装置", "ニデック", "モーター"]
    related_tickers: ["8035.T", "6594.T", "6758.T", "NVDA", "TSM", "ASML", "LRCX", "KLAC", "ARM"]
  自動車:
    keywords: ["自動車", "EV", "トヨタ", "日産", "ホンダ", "デンソー"]
    related_tickers: ["7203.T", "6902.T", "TSLA"]
  重工業・防衛:
    keywords: ["防衛", "重工業", "川崎重工業", "航空機", "造船"]
    related_tickers: ["7012.T"]
  金融:
    keywords: ["日銀", "銀行", "金利", "利上げ", "利下げ"]
    related_tickers: ["8306.T"]
  資源・エネルギー:
    keywords: ["原油", "資源", "エネルギー", "LNG"]
    related_tickers: []
  # 情報通信・生成AI: 生成AIの活用・投資主体（クラウド／通信キャリア）。
  # データセンターを自ら運営・投資する側であり、AI設備投資の直接の主体
  # として恩恵を受ける（v1.8でNTT・Microsoft・Amazonを追加、v1.9で
  # Apple・リクルートホールディングスをスマートフォン／SaaS・人材の
  # 観点で追加）。
  情報通信・生成AI:
    keywords: ["生成AI", "AI", "通信", "ソフトバンク", "プラットフォーム", "クラウド", "SaaS", "スマートフォン", "人材"]
    related_tickers: ["9984.T", "9432.T", "6098.T", "MSFT", "AMZN", "GOOGL", "META", "PLTR", "AAPL"]
  # 電機・電線・素材: データセンター向け電線・部材・冷却関連部品を手掛ける
  # サプライチェーン（v1.8で日立製作所を重電・電力設備の観点で追加）。
  電機・電線・素材:
    keywords: ["パナソニック", "電線", "古河電工", "住友電工", "三菱ケミカル", "旭化成", "化学", "素材", "データセンター", "日立", "重電", "変圧器"]
    related_tickers: ["6752.T", "5801.T", "5802.T", "4188.T", "3407.T", "6501.T"]
  # 電力・インフラ: データセンター向け電力設備・送配電・変圧器・電気工事
  # （建設）を手掛ける業種。きんでんは電気工事（データセンター建設）、
  # 日立製作所は重電・送配電設備の両観点で該当する（v1.8で拡張）。
  電力・インフラ:
    keywords: ["電力", "インフラ", "きんでん", "送配電", "データセンター", "変圧器", "電気工事", "建設"]
    related_tickers: ["1944.T", "6501.T"]

# 継続性の高い（構造的・政策的な背景を持ち、単発の材料出尽くしで終わりにくい）テーマ。
# strategist_engine.py の「継続性」「今後数週間重要か」の評価軸で、
# 単発ニュースより高いスコアを与えるために使う。
durable_themes:
  - "半導体"
  - "生成AI"
  - "AI"
  - "防衛"
  - "データセンター"
  - "資源"
  - "電力"

# ニュースを個別業種・関連銘柄へ変換するための「因果チェーン」ルール。
# 「羅針盤」レポート等から学習した、ストラテジストの一般的な思考プロセス
# （例: 原油安→航空/運輸のコスト低下→関連銘柄への追い風）を
# 汎用的なルールとして一般化したものであり、特定資料の文章の引用ではない。
# trigger_keywords: ニュース見出しに含まれるとルール発動
# beneficiary_sectors / negative_sectors: sectors: のキー名を指定
#   （related_tickers はsectors設定から解決する）
# durable: True の場合、継続性・今後数週間重要か の評価が上がる
causal_rules:
  - trigger_keywords: ["原油高", "原油上昇", "原油急騰", "WTI高"]
    theme: "資源価格"
    beneficiary_sectors: ["資源・エネルギー"]
    negative_sectors: ["自動車", "情報通信・生成AI"]
    durable: false
    note: "原油価格の上昇は資源関連には追い風、輸送・製造コストの増加を通じて他業種には逆風となりやすい"
  - trigger_keywords: ["原油安", "原油下落", "原油急落", "WTI安"]
    theme: "資源価格"
    beneficiary_sectors: ["自動車"]
    negative_sectors: ["資源・エネルギー"]
    durable: false
    note: "原油価格の下落は燃料・輸送コストの低下を通じて運輸・製造関連には追い風となりやすい"
  # AI関連の設備投資は、半導体（GPU・HBM等）だけでなく、データセンターを
  # 自ら運営する情報通信企業、電力・変圧器・電気工事（建設）、電線・冷却
  # 部材まで、サプライチェーン全体に波及しやすい（v1.8でbeneficiary_sectors
  # を拡張し、経済的な因果関係でつながる業種をより広く含めた）。
  - trigger_keywords: ["半導体投資拡大", "AI投資拡大", "設備投資拡大", "データセンター投資", "データセンター建設", "電力設備投資"]
    theme: "AI・半導体設備投資"
    beneficiary_sectors: ["半導体・電子部品", "電機・電線・素材", "電力・インフラ", "情報通信・生成AI"]
    negative_sectors: []
    durable: true
    note: "AI関連の設備投資拡大は、半導体・データセンター運営主体・電力設備（変圧器・電気工事）・電線・冷却部材など、周辺サプライチェーン全体へ波及しやすい"
  - trigger_keywords: ["メモリ価格高騰", "メモリ不足", "部材不足", "発売延期"]
    theme: "AI投資拡大の負の側面"
    beneficiary_sectors: []
    negative_sectors: ["情報通信・生成AI"]
    durable: false
    note: "部材価格の高騰や供給制約は、最終製品を手掛ける川下メーカーには一時的な逆風となる可能性がある"
  - trigger_keywords: ["防衛費", "防衛予算", "防衛装備", "防衛費増額"]
    theme: "防衛"
    beneficiary_sectors: ["重工業・防衛"]
    negative_sectors: []
    durable: true
    note: "防衛予算の拡大方針は、防衛関連の受注環境改善につながりやすい"
  - trigger_keywords: ["利上げ", "タカ派", "追加利上げ観測", "金融引き締め"]
    theme: "金融政策"
    beneficiary_sectors: ["金融"]
    negative_sectors: ["情報通信・生成AI"]
    durable: false
    note: "金利上昇は金融機関の利ざや改善に追い風となる一方、グロース株には割引率上昇を通じた逆風となりやすい"
  - trigger_keywords: ["利下げ", "ハト派", "金融緩和", "緩和的"]
    theme: "金融政策"
    beneficiary_sectors: ["情報通信・生成AI"]
    negative_sectors: ["金融"]
    durable: false
    note: "金利低下はグロース株のバリュエーションには追い風となる一方、金融機関の利ざやには逆風となりやすい"
  - trigger_keywords: ["円安"]
    theme: "為替"
    beneficiary_sectors: ["自動車", "重工業・防衛"]
    negative_sectors: []
    durable: false
    note: "円安方向への動きは輸出関連の採算改善期待につながりやすい"
  - trigger_keywords: ["円高"]
    theme: "為替"
    beneficiary_sectors: []
    negative_sectors: ["自動車", "重工業・防衛"]
    durable: false
    note: "円高方向への動きは輸出関連の採算悪化懸念につながりやすい"
  # v1.9: Watchlist Intelligenceの一致率向上のため、macro_themesを拡張
  # した「自動車」「EV」「蓄電池」「人材」「SaaS」「クラウド」「スマート
  # フォン」「広告」「決済」「建設」「住宅」「旅行」「インバウンド」
  # 「物流」の因果ルールを追加。既存の「金融」「金利」「為替」は、
  # 上記の既存ルール（金融政策・為替）をそのまま再利用する（テーマ名・
  # トリガーキーワードが一致するため新規ルールは不要）。
  - trigger_keywords: ["自動車販売", "新型車", "自動車生産", "自動車市場"]
    theme: "自動車市況"
    beneficiary_sectors: ["自動車"]
    negative_sectors: []
    durable: true
    note: "自動車の生産・販売動向は、完成車・部品メーカーの業績に直結しやすい"
  - trigger_keywords: ["EV普及", "電気自動車", "車載電池", "蓄電池投資"]
    theme: "EV・蓄電池"
    beneficiary_sectors: ["自動車", "電機・電線・素材", "資源・エネルギー"]
    negative_sectors: []
    durable: true
    note: "EV普及は車載電池・関連部材・電池材料（資源）への需要拡大につながりやすい"
  - trigger_keywords: ["人材紹介", "採用市場", "SaaS導入"]
    theme: "人材・SaaS"
    beneficiary_sectors: ["情報通信・生成AI"]
    negative_sectors: []
    durable: true
    note: "SaaS・人材関連サービスの拡大は、プラットフォーム提供企業の収益機会につながりやすい"
  - trigger_keywords: ["クラウド需要", "データセンター拡張", "スマートフォン販売", "広告収益"]
    theme: "クラウド・スマートフォン"
    beneficiary_sectors: ["情報通信・生成AI", "半導体・電子部品"]
    negative_sectors: []
    durable: true
    note: "クラウド・スマートフォン関連需要の拡大は、プラットフォーム企業や半導体需要への波及につながりやすい"
  - trigger_keywords: ["決済", "キャッシュレス", "決済インフラ"]
    theme: "決済"
    beneficiary_sectors: ["金融", "情報通信・生成AI"]
    negative_sectors: []
    durable: true
    note: "キャッシュレス決済の普及は、金融機関・プラットフォーム企業双方に事業機会をもたらしやすい"
  - trigger_keywords: ["建設投資", "住宅着工", "電気工事", "インフラ整備"]
    theme: "建設・住宅"
    beneficiary_sectors: ["電力・インフラ"]
    negative_sectors: []
    durable: true
    note: "建設・住宅関連の投資拡大は、電気工事・設備工事を手掛ける企業の受注環境改善につながりやすい"
  - trigger_keywords: ["インバウンド", "訪日観光客", "旅行需要", "観光"]
    theme: "旅行・インバウンド"
    beneficiary_sectors: []
    negative_sectors: []
    durable: false
    note: "インバウンド需要の拡大は旅行・宿泊・小売など関連業種への追い風となりやすいが、本watchlistには直接該当する銘柄がありません"
  - trigger_keywords: ["個人消費", "消費拡大", "消費者心理"]
    theme: "消費"
    beneficiary_sectors: ["自動車"]
    negative_sectors: []
    durable: false
    note: "個人消費の拡大は、自動車など耐久消費財を含む幅広い消費関連企業への追い風となりやすい"
  - trigger_keywords: ["物流需要", "配送網拡大", "倉庫投資"]
    theme: "物流"
    beneficiary_sectors: ["重工業・防衛"]
    negative_sectors: []
    durable: true
